<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Swiper Center Thumbnail Slider</title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/reset-2.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/6.8.4/swiper-bundle.min.css"><link rel="stylesheet" href="./style.css">

</head>

<body>
    <div class="gallery">
        <div class="swiper-container gallery-slider">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="1.jpg" alt=""></div>
                <div class="swiper-slide"><img src="2.jpg" alt=""></div>
                <div class="swiper-slide"><img src="3.jpg" alt=""></div>
                <div class="swiper-slide"><img src="4.jpg" alt=""></div>
                <div class="swiper-slide"><img src="5.jpg" alt=""></div>
            </div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
        </div>

        <div class="swiper-container gallery-thumbs">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="1.jpg" alt=""></div>
                <div class="swiper-slide"><img src="2.jpg" alt=""></div>
                <div class="swiper-slide"><img src="3.jpg" alt=""></div>
                <div class="swiper-slide"><img src="4.jpg" alt=""></div>
                <div class="swiper-slide"><img src="5.jpg" alt=""></div>
            </div>
        </div>

    </div>

</body>
</html>
